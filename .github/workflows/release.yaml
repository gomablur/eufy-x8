name: Auto Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: version
        run: |
          OLD=$(jq -r '.version' custom_components/eufy_x8/manifest.json)
          MAJOR=${OLD%%.*}; REST=${OLD#*.}; MINOR=${REST%%.*}; PATCH=${REST#*.}
          NEW="$MAJOR.$MINOR.$((PATCH+1))"
          jq --arg v "$NEW" '.version=$v' custom_components/eufy_x8/manifest.json > tmp \
            && mv tmp custom_components/eufy_x8/manifest.json
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add custom_components/eufy_x8/manifest.json
          git commit -m "Bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin main --tags

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true
